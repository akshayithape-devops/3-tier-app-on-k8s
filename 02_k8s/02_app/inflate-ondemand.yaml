apiVersion: apps/v1
kind: Deployment
metadata:
  name: inflate-ondemand
spec:
  # Start at 0 so you can trigger scale-out manually when testing.
  replicas: 0
  selector:
    matchLabels:
      app: inflate-ondemand
  template:
    metadata:
      labels:
        app: inflate-ondemand
    spec:
      terminationGracePeriodSeconds: 0
      # This keeps the workload on Karpenter-provisioned on-demand nodes
      # instead of the small bootstrap managed node group.
      nodeSelector:
        karpenter.sh/capacity-type: on-demand
      containers:
        - name: inflate
          image: public.ecr.aws/eks-distro/kubernetes/pause:3.7
          resources:
            requests:
              cpu: "750m"
              memory: "512Mi"
