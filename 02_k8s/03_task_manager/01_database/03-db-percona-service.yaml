apiVersion: v1
kind: Service
metadata:
  name: mongo-external
  namespace: three-tier-app

spec:
  type: NodePort

  selector:
    app.kubernetes.io/managed-by: percona-server-mongodb-operator
    app.kubernetes.io/instance: mongo-cluster
    app.kubernetes.io/component: mongod

  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
      nodePort: 30017